name: Deploy Backend (FastAPI ATS)

on:
  push:
    branches: [clean_main]
    paths:
      - "backend/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "deployment/**"
      - "requirements.txt"
  workflow_dispatch:

jobs:
  deploy:
    name: Build, Deploy & E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Lint (non-blocking) ──────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint backend (non-blocking)
        run: |
          pip install --quiet ruff
          ruff check backend/ --select E,F --ignore E501 || true

      # ── Deploy via SSH ───────────────────────────────────────────────
      # .env is passed as an environment variable via envs: then written
      # with printf — avoids heredoc delimiter collisions entirely.
      - name: Deploy FastAPI backend to Hetzner
        uses: appleboy/ssh-action@v1.0.3
        env:
          BACKEND_ENV: ${{ secrets.PRODUCTION_ENV_BACKEND }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: ${{ secrets.HETZNER_PORT || 22 }}
          envs: BACKEND_ENV
          script: |
            set -euo pipefail
            cd /opt/srp-ats

            echo "=== [1/5] Pull latest code (clean_main) ==="
            git fetch origin
            git checkout clean_main
            git pull --ff-only origin clean_main

            echo "=== [2/5] Write .env from secret ==="
            printf '%s\n' "$BACKEND_ENV" > /opt/srp-ats/.env
            chmod 600 /opt/srp-ats/.env

            echo "=== [3/5] Stop app only — DB stays running (data safe) ==="
            docker compose stop app  2>/dev/null || true
            docker compose rm -f app 2>/dev/null || true

            echo "=== [4/5] Rebuild image (no cache) ==="
            docker compose build --no-cache app

            echo "=== [5/5] Start & health-check ==="
            docker compose up -d
            HEALTHY=0
            for i in $(seq 1 30); do
              STATUS=$(curl -sf http://127.0.0.1:8009/health 2>/dev/null \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','?'))" 2>/dev/null \
                || echo "waiting")
              if [ "$STATUS" = "healthy" ]; then
                echo "✅ FastAPI healthy (attempt $i)"
                HEALTHY=1; break
              fi
              echo "   Attempt $i/30 — $STATUS"
              sleep 3
            done
            [ "$HEALTHY" -eq 1 ] || { echo "❌ FastAPI never became healthy"; exit 1; }

            sudo systemctl reload nginx 2>/dev/null || true
            docker image prune -f 2>/dev/null || true
            echo "✅ Backend deploy complete"

      # ── E2E: HTTP checks against the live HTTPS domain ──────────────
      # No SSH needed here — the deploy step already confirmed healthy.
      - name: Run HTTPS E2E checks
        run: |
          python3 - << 'PYEOF'
          import ssl, sys, time, urllib.request, urllib.error

          CTX = ssl.create_default_context()
          BASE = "https://recruit.srpailabs.com"
          failures = []

          def get(path, expect):
              for attempt in range(3):
                  try:
                      req = urllib.request.Request(
                          BASE + path, headers={"User-Agent": "SRP-E2E/2.0"}
                      )
                      with urllib.request.urlopen(req, context=CTX, timeout=15) as r:
                          code = r.status
                  except urllib.error.HTTPError as e:
                      code = e.code
                  except Exception as e:
                      if attempt < 2:
                          time.sleep(3); continue
                      print(f"  [FAIL] {path} -> {e}")
                      failures.append(path)
                      return
                  break
              expected = expect if isinstance(expect, (list, tuple)) else [expect]
              ok = code in expected
              print(f"  [{'PASS' if ok else 'FAIL'}] {path} <- HTTP {code}")
              if not ok:
                  failures.append(f"{path} (got {code}, expected {expected})")

          print("\n=== SRP SmartRecruit HTTPS E2E ===")
          get("/health",                200)
          get("/",                      [200, 307, 308])
          get("/api/auth/csrf",         200)
          get("/api/auth/providers",    200)
          get("/login",                 [200, 307, 308])
          get("/api/auth/me",           [401, 403, 405])
          get("/api/resume/list",       [401, 403, 405])
          get("/api/support/tickets",   [401, 403, 405])
          get("/api/screening/results", [401, 403, 405])

          print(f"\n{'✅ All checks passed!' if not failures else '❌ FAILED: ' + str(failures)}")
          sys.exit(1 if failures else 0)
          PYEOF
